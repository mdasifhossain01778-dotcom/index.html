<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️</title>
    
    <!-- মেসেঞ্জারে শেয়ার করার জন্য ব্ল্যাঙ্ক ও ক্লিন মেটা ট্যাগ -->
    <meta property="og:title" content="❤️">
    <meta property="og:description" content=" ">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
        }

        /* কাঁপতে থাকা বড় লাভ বাটন */
        #heart-btn {
            font-size: 140px;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 15px 30px rgba(255, 77, 109, 0.6));
            animation: heartbeat 1s infinite cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.25); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* মূল অ্যানিমেশন স্টেজ */
        #main-stage {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        /* লোগো ও আপনার দেওয়া মূল শুভেচ্ছা বার্তা */
        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 20px;
            z-index: 10;
            opacity: 0;
            transform: translateY(-30px);
            width: 95%;
        }

        .show-header {
            animation: dropDown 1.2s forwards 3.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* বাউবি লোগো */
        .bou-logo {
            width: 75px;
            height: 75px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        /* আপনার টেক্সটের আকর্ষণীয় স্টাইল */
        .header-container h1 {
            color: #c9184a;
            font-size: 22px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.06);
            line-height: 1.5;
            font-weight: bold;
        }

        .header-container p {
            color: #056162;
            font-size: 18px;
            margin-top: 6px;
            font-weight: bold;
        }

        @keyframes dropDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* বিশাল ও ফুল-স্ক্রিন ছড়ানো গাছ কন্টেইনার */
        .tree-wrapper {
            width: 100%;
            max-width: 600px; /* আরও বড় করা হলো */
            height: 80vh;    /* স্ক্রিনের প্রায় পুরোটা জুড়ে থাকবে */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: absolute;
            bottom: 0;
        }

        svg.tree-svg {
            width: 100%;
            height: 100%;
        }

        /* ডালপালার নিখুঁত ড্রইং ও থ্রিডি উইন্ড অ্যানিমেশন */
        .branch {
            stroke: #231309;
            stroke-linecap: round;
            fill: none;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            transform-origin: bottom center;
        }

        .grow-branch {
            animation: drawTree 3.5s forwards cubic-bezier(0.4, 0, 0.2, 1), swayTree 5s infinite ease-in-out alternate 3.5s;
        }

        /* প্রধান ডালগুলোর জন্য ৩ডি ওয়েভ ইফেক্ট */
        .main-trunk { transform-origin: 100px 230px; }
        .left-branch { transform-origin: 100px 130px; }
        .right-branch { transform-origin: 100px 130px; }

        @keyframes drawTree {
            to { stroke-dashoffset: 0; }
        }

        /* বাতাসে গাছের চমৎকার জীবন্ত দুলুনি */
        @keyframes swayTree {
            0% { transform: rotate(0deg) skewX(0deg); }
            50% { transform: rotate(2deg) skewX(1deg); }
            100% { transform: rotate(-2deg) skewX(-1deg); }
        }

        /* লাভ পাতাগুলোর পপ-আপ ও মৃদু কাঁপার অ্যানিমেশন */
        .heart-leaf {
            opacity: 0;
            transform: scale(0);
            transform-origin: center;
            filter: drop-shadow(0 5px 8px rgba(255, 10, 84, 0.3));
        }

        .bloom-leaf {
            animation: popLeaf 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275), leafShiver 3s infinite ease-in-out alternate 4s;
        }

        @keyframes popLeaf {
            to { opacity: 1; transform: scale(1.4); }
        }

        @keyframes leafShiver {
            0% { transform: scale(1.4) rotate(0deg); }
            100% { transform: scale(1.4) rotate(8deg); }
        }

        /* সবার শেষে নিচে সুন্দর বক্সে আপনার নাম আসবে */
        .author-name {
            position: absolute;
            bottom: 15px;
            font-size: 18px;
            color: #ffffff;
            font-weight: bold;
            background: linear-gradient(135deg, #c9184a, #ff4d6d);
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 6px 15px rgba(201, 24, 74, 0.4);
            opacity: 0;
            z-index: 30;
            transform: scale(0.8);
        }

        .show-author {
            animation: popAuthor 1s forwards 4.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popAuthor {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ১. লাফানো লাভ বাটন -->
    <div id="heart-btn">❤️</div>

    <!-- ২. মূল অ্যানিমেশন পেজ -->
    <div id="main-stage">
        <div class="header-container" id="header-box">
            <!-- বাংলাদেশ উন্মুক্ত বিশ্ববিদ্যালয় লোগো -->
            <svg class="bou-logo" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" fill="#006a4e" />
                <circle cx="50" cy="50" r="32" fill="#f42a41" />
                <circle cx="50" cy="50" r="18" fill="#006a4e" />
                <circle cx="50" cy="50" r="6" fill="#fff" />
                <circle cx="50" cy="50" r="45" stroke="#fff" stroke-width="2" fill="none" />
            </svg>
            
            <!-- আপনার দেওয়া হুবহু টেক্সট -->
            <h1>বাংলাদেশ উন্মুক্ত বিশ্ববিদ্যালয় এইচএসসি 2026<br>সবার জন্য শুভকামনা</h1>
            <p>সবাই ভালোভাবে পরীক্ষা দিবেন</p>
        </div>

        <div class="tree-wrapper">
            <!-- একদম নতুন ও বিশাল ছড়ানো ৩ডি গাছ -->
            <svg class="tree-svg" viewBox="0 0 200 230">
                <!-- মোটা প্রধান কাণ্ড ও ছড়ানো ডালপালা -->
                <path class="branch main-trunk" stroke-width="10" d="M100,230 L100,120" />
                <path class="branch left-branch" stroke-width="7" d="M100,130 Q65,85 45,65" />
                <path class="branch right-branch" stroke-width="7" d="M100,130 Q135,85 155,65" />
                <path class="branch left-branch" stroke-width="6" d="M100,160 Q55,130 35,110" />
                <path class="branch right-branch" stroke-width="6" d="M100,160 Q145,130 165,110" />
                
                <!-- উপ-ডালপালা (গাছকে আরও বিশাল ও চওড়া করার জন্য বাড়িয়ে দেওয়া হয়েছে) -->
                <path class="branch" stroke-width="4.5" d="M45,65 Q20,55 10,25" />
                <path class="branch" stroke-width="4.5" d="M45,65 Q60,40 65,20" />
                <path class="branch" stroke-width="4.5" d="M155,65 Q140,40 135,20" />
                <path class="branch" stroke-width="4.5" d="M155,65 Q180,55 190,25" />
                
                <path class="branch" stroke-width="3.5" d="M35,110 Q15,100 5,75" />
                <path class="branch" stroke-width="3.5" d="M35,110 Q50,85 55,65" />
                <path class="branch" stroke-width="3.5" d="M165,110 Q150,85 145,65" />
                <path class="branch" stroke-width="3.5" d="M165,110 Q185,100 195,75" />
                
                <!-- মগডাল (উপরের দিকের চিকন এক্সট্রা ডাল) -->
                <path class="branch" stroke-width="2.5" d="M65,20 Q65,5 65,0" />
                <path class="branch" stroke-width="2.5" d="M135,20 Q135,5 135,0" />
                <path class="branch" stroke-width="2.5" d="M10,25 Q0,20 -5,5" />
                <path class="branch" stroke-width="2.5" d="M190,25 Q200,20 205,5" />

                <!-- ঘন লাভ পাতা (SVG Hearts) - সম্পূর্ণ স্ক্রিন জুড়ে ছড়ানো -->
                <path class="heart-leaf" fill="#d90429" d="M-5,5 C-7,0 -13,0 -13,5 C-13,10 -5,15 -5,15 C-5,15 3,10 3,5 C3,0 -3,0 -5,5 Z" style="transform-origin: -5px 8px; animation-delay: 2.6s;"/>
                <path class="heart-leaf" fill="#ff0a54" d="M205,5 C203,0 197,0 197,5 C197,10 205,15 205,15 C205,15 213,10 213,5 C213,0 207,0 205,5 Z" style="transform-origin: 205px 8px; animation-delay: 2.7s;"/>
                
                <path class="heart-leaf" fill="#ff4d6d" d="M65,0 C63,-5 57,-5 57,0 C57,5 65,10 65,10 C65,10 73,5 73,0 C73,-5 67,-5 65,0 Z" style="transform-origin: 65px 3px; animation-delay: 3.2s;"/>
                <path class="heart-leaf" fill="#ff758f" d="M135,0 C133,-5 127,-5 127,0 C127,5 135,10 135,10 C135,10 143,5 143,0 C143,-5 137,-5 135,0 Z" style="transform-origin: 135px 3px; animation-delay: 3.3s;"/>
                
                <path class="heart-leaf" fill="#c9184a" d="M10,25 C8,20 2,20 2,25 C2,30 10,35 10,35 C10,35 18,30 18,25 C18,20 12,20 10,25 Z" style="transform-origin: 10px 28px; animation-delay: 2.4s;"/>
                <path class="heart-leaf" fill="#ff007f" d="M190,25 C188,20 182,20 182,25 C182,30 190,35 190,35 C190,35 198,30 198,25 C198,20 192,20 190,25 Z" style="transform-origin: 190px 28px; animation-delay: 2.5s;"/>
                
                <path class="heart-leaf" fill="#ffb703" d="M5,75 C3,70 -3,70 -3,75 C-3,80 5,85 5,85 C5,85 13,80 13,75 C13,70 7,70 5,75 Z" style="transform-origin: 5px 78px; animation-delay: 2.0s;"/>
                <path class="heart-leaf" fill="#fb8500" d="M195,75 C193,70 187,70 187,75 C187,80 195,85 195,85 C195,85 203,80 203,75 C203,70 197,70 195,75 Z" style="transform-origin: 195px 78px; animation-delay: 2.1s;"/>

                <path class="heart-leaf" fill="#ff5c8a" d="M35,110 C33,105 27,105 27,110 C27,115 35,120 35,120 C35,120 43,115 43,110 C43,105 37,105 35,110 Z" style="transform-origin: 35px 113px; animation-delay: 1.6s;"/>
                <path class="heart-leaf" fill="#ea698b" d="M165,110 C163,105 157,105 157,110 C157,115 165,120 165,120 C165,120 173,115 173,110 C173,105 167,105 165,110 Z" style="transform-origin: 165px 113px; animation-delay: 1.8s;"/>
                
                <path class="heart-leaf" fill="#ff0a54" d="M55,65 C53,60 47,60 47,65 C47,70 55,75 55,75 C55,75 63,70 63,65 C63,60 57,60 55,65 Z" style="transform-origin: 55px 68px; animation-delay: 2.2s;"/>
                <path class="heart-leaf" fill="#d90429" d="M145,65 C143,60 137,60 137,65 C137,70 145,75 145,75 C145,75 153,70 153,65 C153,60 147,60 145,65 Z" style="transform-origin: 145px 68px; animation-delay: 2.3s;"/>
            </svg>

            <!-- সবার শেষে লোড হওয়া আপনার সুন্দর নাম বক্স -->
            <div class="author-name" id="author-box">Md. Asif Hossain</div>
        </div>
    </div>

    <script>
        const heartBtn = document.getElementById('heart-btn');
        const mainStage = document.getElementById('main-stage');
        const headerBox = document.getElementById('header-box');
        const authorBox = document.getElementById('author-box');
        const branches = document.querySelectorAll('.branch');
        const leaves = document.querySelectorAll('.heart-leaf');

        heartBtn.addEventListener('click', () => {
            // ১. লাভ বাটন সরিয়ে ফুল স্টেজ চালু
            heartBtn.style.display = 'none';
            mainStage.style.display = 'flex';
            
            // ২. ডালপালাগুলোর গতিশীলভাবে ওপরে ওঠার অ্যানিমেশন
            branches.forEach(branch => {
                branch.classList.add('grow-branch');
            });

            // ৩. রঙিন পাতাগুলো ফুটিয়ে তোলা
            leaves.forEach(leaf => {
                leaf.classList.add('bloom-leaf');
            });

            // ৪. লোগো ও মূল মেসেজ শো করা
            headerBox.classList.add('show-header');
            
            // ৫. সবার শেষে আপনার নাম পপ-আপ করা
            authorBox.classList.add('show-author');
        });
    </script>
</body>
</html>
