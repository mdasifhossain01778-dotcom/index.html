<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC 2026 Wishes</title>
    
    <!-- মেসেঞ্জারে শেয়ার করার জন্য ব্ল্যাঙ্ক ও ক্লিন মেটা ট্যাগ -->
    <meta property="og:title" content="❤️">
    <meta property="og:description" content=" ">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
        }

        /* কাঁপতে থাকা বড় লাভ বাটন */
        #heart-btn {
            font-size: 140px;
            cursor: pointer;
            user-select: none;
            filter: drop-shadow(0 15px 30px rgba(255, 77, 109, 0.6));
            animation: heartbeat 1s infinite cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.25); }
            40% { transform: scale(1.05); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* মূল অ্যানিমেশন স্টেজ */
        #main-stage {
            display: none;
            width: 100%;
            height: 100vh;
            position: relative;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
        }

        /* লোগো ও আপনার দেওয়া মূল শুভেচ্ছা বার্তা */
        .header-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 20px;
            z-index: 10;
            opacity: 0;
            transform: translateY(-30px);
            width: 95%;
        }

        .show-header {
            animation: dropDown 1.2s forwards 3.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* বাউবি লোগো */
        .bou-logo {
            width: 70px;
            height: 70px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        /* আপনার টেক্সটের আকর্ষণীয় স্টাইল */
        .header-container h1 {
            color: #c9184a;
            font-size: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.06);
            line-height: 1.5;
            font-weight: bold;
        }

        .header-container p {
            color: #056162;
            font-size: 16px;
            margin-top: 8px;
            font-weight: bold;
            max-width: 500px;
        }

        @keyframes dropDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* বিশাল ও ফুল-স্ক্রিন ছড়ানো গাছ কন্টেইনার */
        .tree-wrapper {
            width: 100%;
            max-width: 600px; 
            height: 75vh;    
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: absolute;
            bottom: 0;
        }

        svg.tree-svg {
            width: 100%;
            height: 100%;
        }

        /* ডালপালার নিখুঁত ড্রইং ও থ্রিডি উইন্ড অ্যানিমেশন */
        .branch {
            stroke: #2c1a0c;
            stroke-linecap: round;
            fill: none;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            transform-origin: bottom center;
        }

        .grow-branch {
            animation: drawTree 3.5s forwards cubic-bezier(0.4, 0, 0.2, 1), swayTree 5s infinite ease-in-out alternate 3.5s;
        }

        /* প্রধান ডালগুলোর জন্য ৩ডি ওয়েভ ইফেক্ট */
        .main-trunk { transform-origin: 100px 230px; }
        .left-branch { transform-origin: 100px 130px; }
        .right-branch { transform-origin: 100px 130px; }

        @keyframes drawTree {
            to { stroke-dashoffset: 0; }
        }

        /* বাতাসে গাছের চমৎকার জীবন্ত দুলুনি */
        @keyframes swayTree {
            0% { transform: rotate(0deg) skewX(0deg); }
            50% { transform: rotate(1.5deg) skewX(0.5deg); }
            100% { transform: rotate(-1.5deg) skewX(-0.5deg); }
        }

        /* রিয়ালিস্টিক পাতা ও লাভ পাতার এনিমেশন */
        .tree-leaf {
            opacity: 0;
            transform: scale(0);
            transform-origin: center;
            filter: drop-shadow(0 3px 5px rgba(0, 0, 0, 0.15));
        }

        .bloom-leaf {
            animation: popLeaf 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275), leafShiver 3s infinite ease-in-out alternate 4s;
        }

        @keyframes popLeaf {
            to { opacity: 1; transform: scale(1.3); }
        }

        @keyframes leafShiver {
            0% { transform: scale(1.3) rotate(0deg); }
            100% { transform: scale(1.3) rotate(10deg); }
        }

        /* নিচে সুন্দর বক্সে আপনার নাম */
        .author-name {
            position: absolute;
            bottom: 25px;
            font-size: 16px;
            color: #ffffff;
            font-weight: bold;
            background: linear-gradient(135deg, #006a4e, #056162);
            padding: 8px 25px;
            border-radius: 30px;
            box-shadow: 0 6px 15px rgba(0, 106, 78, 0.3);
            opacity: 0;
            z-index: 30;
            transform: scale(0.8);
        }

        .show-author {
            animation: popAuthor 1s forwards 4.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popAuthor {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ১. লাফানো লাভ বাটন -->
    <div id="heart-btn">❤️</div>

    <!-- ২. মূল অ্যানিমেশন পেজ -->
    <div id="main-stage">
        <div class="header-container" id="header-box">
            <!-- বাংলাদেশ উন্মুক্ত বিশ্ববিদ্যালয় লোগো -->
            <svg class="bou-logo" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="46" fill="#006a4e" />
                <circle cx="50" cy="50" r="32" fill="#f42a41" />
                <circle cx="50" cy="50" r="18" fill="#006a4e" />
                <circle cx="50" cy="50" r="6" fill="#fff" />
                <circle cx="50" cy="50" r="45" stroke="#fff" stroke-width="2" fill="none" />
            </svg>
            
            <!-- আপনার দেয়া নতুন টেক্সটসমূহ -->
            <h1>উন্মুক্ত বিশ্ববিদ্যালয় এইচএসসি 2026</h1>
            <p>পরীক্ষার সকলের জন্য শুভেচ্ছা সবাই সুন্দরভাবে পরীক্ষা দিবেন আশা করি সবাই এ বছর উত্তীর্ণ হবে ইনশাল্লাহ ( Md.Asif Hossain) </p>
        </div>

        <div class="tree-wrapper">
            <!-- গাছ এবং মাল্টিকালার পাতা -->
            <svg class="tree-svg" viewBox="0 0 200 230">
                <!-- ডালপালা -->
                <path class="branch main-trunk" stroke-width="10" d="M100,230 L100,120" />
                <path class="branch left-branch" stroke-width="7" d="M100,130 Q65,85 45,65" />
                <path class="branch right-branch" stroke-width="7" d="M100,130 Q135,85 155,65" />
                <path class="branch left-branch" stroke-width="6" d="M100,160 Q55,130 35,110" />
                <path class="branch right-branch" stroke-width="6" d="M100,160 Q145,130 165,110" />
                
                <path class="branch" stroke-width="4.5" d="M45,65 Q20,55 10,25" />
                <path class="branch" stroke-width="4.5" d="M45,65 Q60,40 65,20" />
                <path class="branch" stroke-width="4.5" d="M155,65 Q140,40 135,20" />
                <path class="branch" stroke-width="4.5" d="M155,65 Q180,55 190,25" />
                
                <path class="branch" stroke-width="3.5" d="M35,110 Q15,100 5,75" />
                <path class="branch" stroke-width="3.5" d="M35,110 Q50,85 55,65" />
                <path class="branch" stroke-width="3.5" d="M165,110 Q150,85 145,65" />
                <path class="branch" stroke-width="3.5" d="M165,110 Q185,100 195,75" />

                <!-- রিয়ালিস্টিক সবুজ পাতা এবং লাভ পাতা (মাল্টি কালার এড করা হয়েছে) -->
                
                <!-- গাঢ় সবুজ রিয়ালিস্টিক পাতা -->
                <path class="tree-leaf" fill="#1b4332" d="M-5,5 Q-15,5 -5,-5 Q5,5 -5,5 Z" style="transform: translate(-5px, 5px) rotate(45deg); transform-origin: -5px 5px; animation-delay: 2.2s;"/>
                <path class="tree-leaf" fill="#2d6a4f" d="M65,0 Q55,0 65,-10 Q75,0 65,0 Z" style="transform: translate(65px, 0px) rotate(-15deg); transform-origin: 65px 0px; animation-delay: 2.5s;"/>
                <path class="tree-leaf" fill="#1b4332" d="M135,0 Q125,0 135,-10 Q145,0 135,0 Z" style="transform: translate(135px, 0px) rotate(20deg); transform-origin: 135px 0px; animation-delay: 2.8s;"/>
                <path class="tree-leaf" fill="#2d6a4f" d="M205,5 Q195,5 205,-5 Q215,5 205,5 Z" style="transform: translate(205px, 5px) rotate(-45deg); transform-origin: 205px 5px; animation-delay: 2.1s;"/>

                <!-- হালকা সবুজ ও টিয়া পাতা (রিয়ালিস্টিক ফিল আনতে) -->
                <path class="tree-leaf" fill="#52b788" d="M10,25 Q0,25 10,15 Q20,25 10,25 Z" style="transform: translate(10px, 25px) rotate(30deg); transform-origin: 10px 25px; animation-delay: 3.0s;"/>
                <path class="tree-leaf" fill="#74c69d" d="M190,25 Q180,25 190,15 Q200,25 190,25 Z" style="transform: translate(190px, 25px) rotate(-30deg); transform-origin: 190px 25px; animation-delay: 3.1s;"/>
                <path class="tree-leaf" fill="#52b788" d="M35,110 Q25,110 35,100 Q45,110 35,110 Z" style="transform: translate(35px, 110px) rotate(60deg); transform-origin: 35px 113px; animation-delay: 1.7s;"/>
                <path class="tree-leaf" fill="#74c69d" d="M165,110 Q155,110 165,100 Q175,110 165,110 Z" style="transform: translate(165px, 110px) rotate(-60deg); transform-origin: 165px 113px; animation-delay: 1.9s;"/>

                <!-- আকর্ষণীয় লাভ পাতা (লাল, গোলাপী, হলুদ ও অরেঞ্জ মিক্সড) -->
                <path class="tree-leaf" fill="#d90429" d="M5,75 C3,70 -3,70 -3,75 C-3,80 5,85 5,85 C5,85 13,80 13,75 C13,70 7,70 5,75 Z" style="transform-origin: 5px 78px; animation-delay: 2.4s;"/>
                <path class="tree-leaf" fill="#ff0a54" d="M195,75 C193,70 187,70 187,75 C187,80 195,85 195,85 C195,85 203,80 203,75 C203,70 197,70 195,75 Z" style="transform-origin: 195px 78px; animation-delay: 2.6s;"/>
                <path class="tree-leaf" fill="#ffb703" d="M55,65 C53,60 47,60 47,65 C47,70 55,75 55,75 C55,75 63,70 63,65 C63,60 57,60 55,65 Z" style="transform-origin: 55px 68px; animation-delay: 3.3s;"/>
                <path class="tree-leaf" fill="#fb8500" d="M145,65 C143,60 137,60 137,65 C137,70 145,75 145,75 C145,75 153,70 153,65 C153,60 147,60 145,65 Z" style="transform-origin: 145px 68px; animation-delay: 3.5s;"/>
                <path class="tree-leaf" fill="#ff4d6d" d="M100,90 C98,85 92,85 92,90 C92,95 100,100 100,100 C100,100 108,95 108,90 C108,85 102,85 100,90 Z" style="transform-origin: 100px 93px; animation-delay: 3.6s;"/>
            </svg>

            <!-- সবার শেষে লোড হওয়া আপনার সুন্দর নাম বক্স -->
            <div class="author-name" id="author-box">Md. Asif Hossain</div>
        </div>
    </div>

    <script>
        const heartBtn = document.getElementById('heart-btn');
        const mainStage = document.getElementById('main-stage');
        const headerBox = document.getElementById('header-box');
        const authorBox = document.getElementById('author-box');
        const branches = document.querySelectorAll('.branch');
        const leaves = document.querySelectorAll('.tree-leaf');

        heartBtn.addEventListener('click', () => {
            // ১. লাভ বাটন সরিয়ে ফুল স্টেজ চালু
            heartBtn.style.display = 'none';
            mainStage.style.display = 'flex';
            
            // ২. ডালপালাগুলোর গতিশীলভাবে ওপরে ওঠার অ্যানিমেশন
            branches.forEach(branch => {
                branch.classList.add('grow-branch');
            });

            // ৩. রঙিন পাতাগুলো ফুটিয়ে তোলা
            leaves.forEach(leaf => {
                leaf.classList.add('bloom-leaf');
            });

            // ৪. লোগো ও মূল মেসেজ শো করা
            headerBox.classList.add('show-header');
            
            // ৫. সবার শেষে আপনার নাম পপ-আপ করা
            authorBox.classList.add('show-author');
        });
    </script>
</body>
</html>
